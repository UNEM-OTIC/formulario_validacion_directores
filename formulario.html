<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>FORMULARIO DOCENTES</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/css/bootstrap.min.css"
        integrity="sha384-/Y6pD6FV/Vv2HJnA6t+vslU6fwYXjCFtcEpHbNJ0lyAFsXTsjBbfaDjzALeQsN6M" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.5.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <link rel='stylesheet'
        href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.0.0-beta/css/bootstrap.min.css'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.5.0/css/font-awesome.min.css'>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta24/dist/css/tabler.min.css">

    <style>
        @media (max-width: 770px) {
            .sigla {
                margin: auto;
                text-align: center;
            }

            .logo {
                margin: auto;
                padding-top: 10px !important;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header class="navbar navbar-expand-md d-print-none bg-blue">
            <div class="container-xl">
                <div class="logo navbar-brand navbar-brand-autodark d-none-navbar-horizontal p-0 d-flex justify-content-center justify-content-md-start">
                    <img src="./assets/logo-oficial.png" alt="Logo UNEM" style="width: 200px;">
                </div>
                <div class="navbar-nav flex-row order-md-last sigla">
                    <div class="nav-item me-3">
                        <p class="m-0 text-white" style="font-weight: 700;">
                            Universidad Nacional Experimental del Magisterio "Samuel Robinson" - UNEM
                        </p>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-wrapper">
            <div class="page-body m-0">
                <div class="container-xl py-4">
                    <div class="card card-md">
                        <div class="card-header">
                            <h3 class="card-title">Datos del Docente</h3>
                        </div>
                        <div class="card-body">
                            <form id="datosForm" autocomplete="off" novalidate="">
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label mb-2">Nombre:</label>
                                        <input type="text" id="nombre" class="form-control" placeholder="Ej. Juan">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label mb-2">Apellido:</label>
                                        <input type="text" id="apellido" class="form-control" placeholder="Ej. Pérez">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label mb-2">Cédula:</label>
                                        <input type="text" id="cedula" class="form-control" placeholder="Ej. 12345678">
                                    </div>
                                </div>
                                <div class="form-footer mt-4">
                                    <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="footer footer-transparent d-print-none text-muted m-0 pt-3 pe-3 pb-3 ps-3 bg-blue">
                <div class="container-xl text-center ">
                    <p class="m-0 text-white">© Copyright <span id="current-year"></span>. Todos los Derechos Reservados.
                        Universidad Nacional Experimental del Magisterio Samuel Robinson</p>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta24/dist/js/tabler.min.js"></script>
    <script src="controller/formulario.js"></script>
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
